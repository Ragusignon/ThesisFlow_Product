<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="96" fill="#00A7A5"/>
  
  <!-- Stylized TF lettermark -->
  <g transform="translate(128, 128)">
    <!-- Letter T -->
    <rect x="0" y="0" width="256" height="56" rx="8" fill="white"/>
    <rect x="100" y="56" width="56" height="200" rx="8" fill="white"/>
    
    <!-- Letter F accent -->
    <rect x="0" y="0" width="56" height="256" rx="8" fill="white" opacity="0.3"/>
    <rect x="0" y="0" width="180" height="56" rx="8" fill="white" opacity="0.3"/>
    <rect x="0" y="100" width="140" height="48" rx="8" fill="white" opacity="0.3"/>
    
    <!-- Modern accent elements -->
    <circle cx="220" cy="220" r="18" fill="white" opacity="0.5"/>
    <rect x="200" y="32" width="8" height="192" rx="4" fill="white" opacity="0.4"/>
  </g>
</svg>
